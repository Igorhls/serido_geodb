{% load static %}
<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>WebGIS | Eólicas do Seridó</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Leaflet.markercluster CDN -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <style>
        /* Remove as margens para o mapa ocupar a tela toda com um visual moderno */
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Manrope', sans-serif; }
        .voltar-btn {
            position: absolute; top: 20px; left: 60px; z-index: 1000;
            background: #ffffff; padding: 10px 20px; border-radius: 8px;
            text-decoration: none; color: #000; font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); transition: 0.2s;
        }
        .voltar-btn:hover { background: #f1f5f9; }

        /* Estilização moderna e premium para os Pop-ups */
        .custom-popup .leaflet-popup-content-wrapper {
            background: #1e293b; /* Slate 800 */
            color: #f8fafc;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            padding: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .custom-popup .leaflet-popup-tip {
            background: #1e293b;
        }
        .custom-popup .leaflet-popup-content {
            margin: 12px 16px;
        }
        .popup-card {
            font-family: 'Manrope', sans-serif;
            min-width: 220px;
        }
        .popup-title {
            font-size: 1rem;
            font-weight: 700;
            color: #0ea5e9; /* Sky 500 */
            margin-bottom: 8px;
            border-bottom: 1px solid #334155; /* Slate 700 */
            padding-bottom: 6px;
        }
        .popup-body {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .popup-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
        }
        .popup-label {
            color: #94a3b8; /* Slate 400 */
            font-weight: 600;
        }
        .popup-val {
            color: #e2e8f0; /* Slate 200 */
            font-weight: 700;
            text-align: right;
        }
        .status-tag {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: bold;
        }
        .status-active {
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        .status-inactive {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
    </style>
  </head>
  <body>
    
    <a href="{% url 'pagina_inicio' %}" class="voltar-btn">⬅ Voltar ao Início</a>
    
    <div id="meu-mapa" style="height: 100%; width: 100%;"></div>

    <script>
        // Foco ajustado exatamente para o Rio Grande do Norte / Seridó!
        var map = L.map('meu-mapa').setView([-6.2, -36.5], 8);

        // Camadas de fundo (TileLayers)
        var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        });

        var satelite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community'
        });

        // Adiciona o OpenStreetMap padrão ao mapa
        osm.addTo(map);

        var geojsonData = {{ eolicas_geojson|safe }};

        // Camada 1: Visão Simples (Sem agrupamento, pop-up básico)
        var visaoSimples = L.geoJSON(geojsonData, {
            onEachFeature: function (feature, layer) {
                if (feature.properties && feature.properties.nome_parque) {
                    layer.bindPopup("<b>Parque Eólico:</b> " + feature.properties.nome_parque);
                }
            }
        });

        // Camada 2: Visão Agrupada (Com marker cluster e pop-ups enriquecidos)
        var geojsonLayerEnriquecido = L.geoJSON(geojsonData, {
            onEachFeature: function (feature, layer) {
                if (feature.properties) {
                    var nome = feature.properties.nome_parque || 'Não informado';
                    var status = feature.properties.status_operacional || 'Não informado';
                    
                    var cap = feature.properties.capacidade_mw;
                    var capFormatted = (cap !== undefined && cap !== null) ? parseFloat(cap).toFixed(2) + ' MW' : 'Não informado';
                    
                    var fonte = feature.properties.fonte_dado || 'Não informado';

                    // Formatação do status com badge colorida
                    var statusHtml = status;
                    if (status !== 'Não informado') {
                        var statusClean = status.toLowerCase();
                        if (statusClean.includes('op') || statusClean.includes('func') || statusClean.includes('ativ')) {
                            statusHtml = `<span class="status-tag status-active">${status}</span>`;
                        } else {
                            statusHtml = `<span class="status-tag status-inactive">${status}</span>`;
                        }
                    } else {
                        statusHtml = `<span class="status-tag" style="background: rgba(255,255,255,0.1); color: #94a3b8;">Não informado</span>`;
                    }

                    var htmlContent = `
                        <div class="popup-card">
                            <div class="popup-title">${nome}</div>
                            <div class="popup-body">
                                <div class="popup-item">
                                    <span class="popup-label">Status:</span>
                                    <span class="popup-val">${statusHtml}</span>
                                </div>
                                <div class="popup-item">
                                    <span class="popup-label">Capacidade:</span>
                                    <span class="popup-val">${capFormatted}</span>
                                </div>
                                <div class="popup-item">
                                    <span class="popup-label">Fonte:</span>
                                    <span class="popup-val">${fonte}</span>
                                </div>
                            </div>
                        </div>
                    `;
                    layer.bindPopup(htmlContent, { className: 'custom-popup' });
                }
            }
        });

        var visaoAgrupada = L.markerClusterGroup();
        visaoAgrupada.addLayer(geojsonLayerEnriquecido);

        // Adiciona a Visão Agrupada ao mapa por padrão
        map.addLayer(visaoAgrupada);

        // Controle de Camadas de Fundo (Tiles)
        var basesDeFundo = {
            "OpenStreetMap": osm,
            "Satélite (Esri)": satelite
        };

        // Controle de Camadas de Dados (Radio buttons para alternância)
        var mapasBase = {
            "Visão Agrupada (Nova)": visaoAgrupada,
            "Visão Simples (Antiga)": visaoSimples
        };

        // Adiciona os controles ao mapa
        L.control.layers(basesDeFundo, null, {position: 'topright'}).addTo(map);
        L.control.layers(mapasBase, null, {collapsed: false, position: 'topright'}).addTo(map);
    </script>
  </body>
</html>
