{% load static %}
<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>WebGIS | Eólicas do Seridó</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- Leaflet.markercluster CDN -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <style>
        /* Remove as margens para o mapa ocupar a tela toda com um visual moderno */
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Manrope', sans-serif; }
        .voltar-btn {
            position: absolute; top: 20px; left: 60px; z-index: 1000;
            background: #ffffff; padding: 10px 20px; border-radius: 8px;
            text-decoration: none; color: #000; font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); transition: 0.2s;
        }
        .voltar-btn:hover { background: #f1f5f9; }

        /* Estilização moderna e premium para os Pop-ups */
        .custom-popup .leaflet-popup-content-wrapper {
            background: #1e293b; /* Slate 800 */
            color: #f8fafc;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            padding: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .custom-popup .leaflet-popup-tip {
            background: #1e293b;
        }
        .custom-popup .leaflet-popup-content {
            margin: 12px 16px;
        }
        .popup-card {
            font-family: 'Manrope', sans-serif;
            min-width: 220px;
        }
        .popup-title {
            font-size: 1rem;
            font-weight: 700;
            color: #0ea5e9; /* Sky 500 */
            margin-bottom: 8px;
            border-bottom: 1px solid #334155; /* Slate 700 */
            padding-bottom: 6px;
        }
        .popup-body {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .popup-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
        }
        .popup-label {
            color: #94a3b8; /* Slate 400 */
            font-weight: 600;
        }
        .popup-val {
            color: #e2e8f0; /* Slate 200 */
            font-weight: 700;
            text-align: right;
        }
        .status-tag {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            text-transform: uppercase;
            font-weight: bold;
        }
        .status-active {
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }
        .status-inactive {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        /* Estatísticas do Banco flutuante */
        .estatisticas-banco {
            position: absolute;
            top: 20px;
            left: 240px;
            z-index: 1000;
            background: rgba(30, 41, 59, 0.9);
            color: #f8fafc;
            padding: 10px 16px;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            font-family: 'Manrope', sans-serif;
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            gap: 2px;
            pointer-events: auto;
        }
        .estatisticas-banco h3 {
            margin: 0;
            font-size: 0.95rem;
            font-weight: 700;
            color: #0ea5e9;
        }
        .estatisticas-banco small {
            font-size: 0.75rem;
            color: #94a3b8;
        }
        
        /* Estilo para remover fundo branco padrão do DivIcon */
        .custom-div-icon {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
        }
    </style>
  </head>
  <body>
    
    <a href="{% url 'pagina_inicio' %}" class="voltar-btn">⬅ Voltar ao Início</a>
    
    <div class="estatisticas-banco">
        <h3>Quantidade de Torres: {{ qtd_torres }}</h3>
        {% if ultima_atualizacao %}
            <small class="text-muted">
                Última atualização do banco: {{ ultima_atualizacao|date:"d/m/Y H:i" }}
            </small>
        {% endif %}
    </div>
    
    <div id="meu-mapa" style="height: 100%; width: 100%;"></div>

    <script>
        // 1. Definição do Ícone de Torre Eólica Customizado (SVG Realista)
        var eolicaIcon = L.divIcon({
            html: `
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="36" height="36" style="filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.45));">
              <!-- Torre / Mast -->
              <path d="M30 60 L31.5 24 L32.5 24 L34 60 Z" fill="#cbd5e1" stroke="#475569" stroke-width="1"/>
              <!-- Rotor / Centro -->
              <circle cx="32" cy="24" r="2.5" fill="#f8fafc" stroke="#334155" stroke-width="1"/>
              <!-- Pás / Blades (Elegantes e realistas) -->
              <g stroke="#0ea5e9" stroke-width="2.2" stroke-linecap="round" fill="none">
                <!-- Pá Vertical Superior -->
                <line x1="32" y1="24" x2="32" y2="4" />
                <!-- Pá Direita/Baixo -->
                <line x1="32" y1="24" x2="48" y2="33" />
                <!-- Pá Esquerda/Baixo -->
                <line x1="32" y1="24" x2="16" y2="33" />
              </g>
            </svg>
            `,
            className: 'custom-div-icon',
            iconSize: [36, 36],
            iconAnchor: [18, 34],
            popupAnchor: [0, -34]
        });
        // Foco ajustado exatamente para o Rio Grande do Norte / Seridó!
        var map = L.map('meu-mapa').setView([-6.2, -36.5], 8);

        // Camadas de fundo (TileLayers)
        var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        });

        var satelite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EGP, and the GIS User Community'
        });

        // Adiciona o OpenStreetMap padrão ao mapa
        osm.addTo(map);

        var geojsonData = {{ eolicas_geojson|safe }};

        // Camada 1: Visão Simples (Sem agrupamento, pop-up básico)
        var visaoSimples = L.geoJSON(geojsonData, {
            pointToLayer: function (feature, latlng) {
                return L.marker(latlng, { icon: eolicaIcon });
            },
            onEachFeature: function (feature, layer) {
                if (feature.properties && feature.properties.nome_parque) {
                    layer.bindPopup("<b>Parque Eólico:</b> " + feature.properties.nome_parque);
                }
            }
        });

        // Camada 2: Visão Agrupada (Com marker cluster e pop-ups enriquecidos)
        var geojsonLayerEnriquecido = L.geoJSON(geojsonData, {
            pointToLayer: function (feature, latlng) {
                return L.marker(latlng, { icon: eolicaIcon });
            },
            onEachFeature: function (feature, layer) {
                if (feature.properties) {
                    var nome = feature.properties.nome_parque || 'Não informado';
                    var status = feature.properties.status_operacional || 'Não informado';
                    
                    // Captura e formatação das coordenadas da torre
                    var coords = feature.geometry && feature.geometry.coordinates;
                    var coordsFormatted = coords ? `${coords[1].toFixed(5)}, ${coords[0].toFixed(5)}` : 'Não informado';
                    
                    var fonte = feature.properties.fonte_dado || 'Não informado';

                    // Formatação do status com badge colorida
                    var statusHtml = status;
                    if (status !== 'Não informado') {
                        var statusClean = status.toLowerCase();
                        if (statusClean.includes('op') || statusClean.includes('func') || statusClean.includes('ativ')) {
                            statusHtml = `<span class="status-tag status-active">${status}</span>`;
                        } else {
                            statusHtml = `<span class="status-tag status-inactive">${status}</span>`;
                        }
                    } else {
                        statusHtml = `<span class="status-tag" style="background: rgba(255,255,255,0.1); color: #94a3b8;">Não informado</span>`;
                    }

                    var htmlContent = `
                        <div class="popup-card">
                            <div class="popup-title">${nome}</div>
                            <div class="popup-body">
                                <div class="popup-item">
                                    <span class="popup-label">Status:</span>
                                    <span class="popup-val">${statusHtml}</span>
                                </div>
                                <div class="popup-item">
                                    <span class="popup-label">Coordenadas:</span>
                                    <span class="popup-val">${coordsFormatted}</span>
                                </div>
                                <div class="popup-item">
                                    <span class="popup-label">Fonte:</span>
                                    <span class="popup-val">${fonte}</span>
                                </div>
                            </div>
                        </div>
                    `;
                    layer.bindPopup(htmlContent, { className: 'custom-popup' });
                }
            }
        });

        var visaoAgrupada = L.markerClusterGroup();
        visaoAgrupada.addLayer(geojsonLayerEnriquecido);

        // Adiciona a Visão Agrupada ao mapa por padrão
        map.addLayer(visaoAgrupada);

        // Controle de Camadas de Fundo (Tiles)
        var basesDeFundo = {
            "OpenStreetMap": osm,
            "Satélite (Esri)": satelite
        };

        // Controle de Camadas de Dados (Radio buttons para alternância)
        var mapasBase = {
            "Visão Agrupada (Nova)": visaoAgrupada,
            "Visão Simples (Antiga)": visaoSimples
        };

        // Adiciona os controles ao mapa
        L.control.layers(basesDeFundo, null, {position: 'topright'}).addTo(map);
        L.control.layers(mapasBase, null, {collapsed: false, position: 'topright'}).addTo(map);
    </script>
  </body>
</html>
