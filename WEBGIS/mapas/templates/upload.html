<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Upload de Eólicas</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f9; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); max-width: 500px; }
        h2 { color: #333; }
        .btn { background: #28a745; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; }
        .btn:hover { background: #218838; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Importar Shapefile de Energia Eólica</h2>
        <p>Por favor, envie um arquivo <b>.zip</b> contendo os arquivos do shapefile (.shp, .shx, .dbf, .prj).</p>
        
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <input type="file" name="arquivo_zip" accept=".zip" required>
            <br><br>
            <button type="submit" class="btn">Processar e Salvar no Banco</button>
        </form>
    </div>
</body>
</html>
